<!DOCTYPE html>
<html>
<head>
  <title>My CRM</title>
</head>
<body>

<h2>Add Client</h2>

<input id="name" placeholder="Name"><br><br>
<input id="phone" placeholder="Phone"><br><br>
<input id="budget" placeholder="Budget"><br><br>
<input id="type" placeholder="Type"><br><br>
<input id="size" placeholder="Size"><br><br>
<input id="remarks" placeholder="Remarks"><br><br>

<button onclick="addClient()">Save Client</button>

<h2>Clients</h2>
<ul id="list"></ul>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDGDqE8Gzms6ffsI064C2H5EJBOlKrch-k",
  authDomain: "property-crm-7277.firebaseapp.com",
  projectId: "property-crm-7277",
  storageBucket: "property-crm-7277.firebasestorage.app",
  messagingSenderId: "641855290480",
  appId: "1:641855290480:web:94d40fb5b60611249788b5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ➕ Add client
window.addClient = async function() {
  await addDoc(collection(db, "clients"), {
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    budget: document.getElementById("budget").value,
    type: document.getElementById("type").value,
    size: document.getElementById("size").value,
    remarks: document.getElementById("remarks").value
  });

  alert("Client Saved!");
  loadClients();
};

// 📄 Load clients
async function loadClients() {
  const querySnapshot = await getDocs(collection(db, "clients"));
  let html = "";

  querySnapshot.forEach(doc => {
    const c = doc.data();

    html += `
      <li style="margin-bottom:15px;">
        <b>${c.name}</b><br>
        📱 ${c.phone}<br>
        💰 ${c.budget}<br>
        🏠 ${c.type} | 📏 ${c.size}<br>
        📝 ${c.remarks}<br><br>

        <a href="tel:${c.phone}">
          <button style="background:green;color:white;">
            📞 Call
          </button>
        </a>
      </li>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

loadClients();

</script>

</body>
</html>
